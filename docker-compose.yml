services:
  postgres:
    image: postgres:16
    container_name: issuetracker-db

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend/IssueTracker
      dockerfile: IssueTracker.Api/Dockerfile

    container_name: issuetracker-api

    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}

      ASPNETCORE_URLS: "http://+:8080"

      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}

      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES}

      TestUser__Email: ${TEST_USER_EMAIL}
      TestUser__Password: ${TEST_USER_PASSWORD}

      Frontend__Url: ${FRONTEND_URL}

    ports:
      - "5000:8080"

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - ./backend/IssueTracker/IssueTracker.Api/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}

    container_name: issuetracker-frontend

    ports:
      - "8080:80"

    depends_on:
      - api

volumes:
  postgres_data:
